spring.application.name=petmatch

# File upload directory (relative to working directory)
app.upload.dir=uploads/images

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

jwt.secret=your-256-bit-secret-key-here-make-it-at-least-32-bytes-long

# Database Connection
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=admin
spring.datasource.password=admin

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Remove this if in production
logging.level.org.hibernate.orm.jdbc.bind=trace